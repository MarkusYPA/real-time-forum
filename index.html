<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Forum</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div id="loginSection">
        <h2>Login</h2>
        <input type="text" id="username-or-email" placeholder="Username or E-mail" autocomplete="username"><br>
        <input type="password" id="password-login" placeholder="Password" autocomplete="current-password"><br>
        <button id="login-button">Login</button><br>
        <button id="open-registeration-button">Register</button>
        <p id="errorMessageLogin"></p>
    </div>

    <div id="registerSection" style="display: none">
        <h2>Register</h2>
        <input type="text" id="username-register" placeholder="Username or Email"><br>
        <input type="number" id="age" placeholder="Age" min="0" max="150"><br>
        <select id="gender">
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
            <option value="unspecified">Unspecified</option>
        </select><br>
        <input type="text" id="firstname" placeholder="First Name"><br>
        <input type="text" id="lastname" placeholder="Last Name"><br>
        <input type="text" id="email" placeholder="E-mail"><br>
        <input type="password" id="password-register" placeholder="Password"><br>
        <button id="register-button">Register</button><br>
        <button id="open-login-button">Back to login</button>
        <p id="errorMessageRegister"></p>
    </div>

    <div id="forumSection" style="display: none">
        <h2>Forum</h2>
        <input type="text" id="postTitle" placeholder="Post title" maxlength=50><br>
        <textarea id="postInput" placeholder="Write a post..."  maxlength=3000></textarea><br>

        <select id="categorySelector">
            <option value="" disabled selected>Add category</option>
            <option value="aesthetics">Aesthetics</option>
            <option value="epistemology">Epistemology</option>
            <option value="ethics">Ethics</option>
            <option value="logic">Logic</option>
            <option value="metaphysics">Metaphysics</option>
            <option value="other">Other</option>
        </select>
        <button id="remove-category-button">Remove Category</button><br>
        <div id="categories" class="category-display"></div><br>

        <button id="send-post-button">Post</button>
        <div id="postsFeed"></div>
        <button id="logout-button">Logout</button>
        <p id="errorMessageFeed"></p>
    </div>

    <script type="module" src="static/realtime.js"></script>
</body>

</html>
